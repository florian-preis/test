<!-- _includes/head.html
     Usage: {% include head.html title="Page" description="…" og_image="/img/…" %}
     All params optional — fall back to site-level values from _config.yml -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

{% if include.title %}
<title>{{ include.title }} | {{ site.title }}</title>
{% else %}
<title>{{ site.title }}</title>
{% endif %}

{% if include.description %}
<meta name="description" content="{{ include.description }}">
{% else %}
<meta name="description" content="{{ site.description }}">
{% endif %}

<meta property="og:type"      content="website">
<meta property="og:site_name" content="{{ site.title }}">
{% if include.title %}
<meta property="og:title"     content="{{ include.title }} | {{ site.title }}">
{% else %}
<meta property="og:title"     content="{{ site.title }}">
{% endif %}
{% if include.description %}
<meta property="og:description" content="{{ include.description }}">
{% else %}
<meta property="og:description" content="{{ site.description }}">
{% endif %}
<meta property="og:url"       content="{{ site.url }}{{ page.url }}">
{% if include.og_image %}
<meta property="og:image"     content="{{ site.url }}{{ include.og_image }}">
{% endif %}

<!-- Favicon — inline SVG, zero extra request -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23111'/><text x='50%25' y='23' text-anchor='middle' font-family='Helvetica Neue,sans-serif' font-size='14' font-weight='700' fill='white' letter-spacing='0.5'>FP</text></svg>">

<link rel="stylesheet" href="/assets/css/main.css">
